version: '3.8'

networks:
  guildarena_net:
    driver: bridge

services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports: 
      - "6379:6379"
    networks: 
      - guildarena_net

  postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: GuildArenaDb
    ports: 
      - "5432:5432"
    networks: 
      - guildarena_net

  redis-insight:
    image: redis/redisinsight:latest
    ports: 
      - "5540:5540"
    networks: 
      - guildarena_net
    depends_on: 
      - redis

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@guildarena.com
      PGADMIN_DEFAULT_PASSWORD: password123
    ports: 
      - "5050:80"
    networks: 
      - guildarena_net
    depends_on: 
      - postgres

  guildarena-api:
    image: guildarena-api:latest
    build: 
      context: .
      dockerfile: src/GuildArena.Api/Dockerfile
    ports:
      - "5016:8080"
    networks:
      - guildarena_net
    profiles: 
      - apps
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection:-Host=postgres;Port=5432;Database=GuildArenaDb;Username=admin;Password=password123}
      - ConnectionStrings__Redis=${ConnectionStrings__Redis:-redis:6379}
      - ConnectionStrings__AzureBlobStorage=${ConnectionStrings__AzureBlobStorage}
    depends_on:
      - postgres
      - redis

volumes:
  redis_data:
  postgres_data:
    external: true
    name: guildarena_postgres_data