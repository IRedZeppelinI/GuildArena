<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
</head>
<body style="background-color: #121212; color: #e0e0e0; font-family: Helvetica, Arial, sans-serif; margin: 0; padding: 0; -webkit-font-smoothing: antialiased;">
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #121212; padding: 40px 0;">
        <tr>
            <td align="center">
                <!-- Main Container -->
                <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #1a1a1a; border: 1px solid #d4af37; border-radius: 4px; max-width: 600px; margin: 0 auto; table-layout: fixed;">

                    <!-- Header -->
                    <tr>
                        <td align="center" style="background-color: #050505; padding: 30px; border-bottom: 2px solid #333;">
                            <h1 style="color: #ffd800; margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; font-family: Georgia, 'Times New Roman', serif;">
                                {{TITLE}}
                            </h1>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td align="center" style="padding: 40px 30px; text-align: center; line-height: 1.7; font-size: 16px; word-wrap: break-word; word-break: break-word; overflow-wrap: break-word;">
                            <h2 style="color: #ffffff; margin-top: 0; font-size: 20px; margin-bottom: 20px; font-family: Georgia, 'Times New Roman', serif;">
                                {{HEADER}}
                            </h2>
                            <p style="color: #e0e0e0; margin-bottom: 35px; word-wrap: break-word; word-break: break-word; overflow-wrap: break-word;">
                                {{BODY}}
                            </p>

                            <!-- Action Button -->
                            <table border="0" cellspacing="0" cellpadding="0" align="center">
                                <tr>
                                    <td align="center" style="border-radius: 4px; background-color: #1a1a1a;">
                                        <a href="{{BUTTON_LINK}}" target="_blank" style="display: inline-block; padding: 14px 30px; font-family: Georgia, 'Times New Roman', serif; font-weight: bold; color: #ffd800; text-decoration: none; border: 2px solid #ffd800; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px;">
                                            {{BUTTON_TEXT}}
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center" style="background-color: #050505; padding: 20px; font-size: 12px; color: #777777; border-top: 2px solid #333333;">
                            &copy; {{YEAR}} GuildArena. All rights reserved.
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
